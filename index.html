<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MVM Public School - Central ERP Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            background-color: #000; 
        }
        
        /* 🔱 MAHADEV VIDEO BACKGROUND */
        #bg-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -3;
            transform: translateX(-50%) translateY(-50%);
            object-fit: cover;
        }
        
        /* 🎨 THEME BLENDING: Overlay with cosmic tint */
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(3, 7, 18, 0.7) 0%, rgba(30, 10, 60, 0.5) 50%, rgba(2, 6, 23, 0.8) 100%);
            z-index: -2;
        }

        /* 🟢 LIVE SYNC INDICATOR */
        .server-sync {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
            backdrop-filter: blur(5px);
            text-transform: uppercase;
        }
        .sync-dot {
            width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 8px #10b981; animation: blinkDot 1s infinite;
        }
        @keyframes blinkDot { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* 📦 LOGIN CARD */
        .login-wrapper {
            position: relative;
            width: 90%;
            max-width: 400px;
            z-index: 10;
        }

        .login-card {
            background: rgba(10, 10, 20, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 40px 30px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            text-align: center;
        }

        .school-logo {
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 5px;
            color: #fff;
            letter-spacing: 2px;
        }
        .school-sub {
            font-size: 13px;
            color: #a78bfa;
            margin-bottom: 30px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 🎛️ TAB SWITCHER */
        .tab-container {
            display: flex;
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 5px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #94a3b8;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .tab-btn.active {
            color: #fff;
            background: rgba(255,255,255,0.1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* 📝 FORMS */
        .login-form { display: none; }
        .login-form.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label {
            display: block; font-size: 12px; color: #e2e8f0; margin-bottom: 8px; font-weight: bold; text-transform: uppercase;
        }
        .input-group input {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 14px;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus {
            border-color: #8b5cf6;
            background: rgba(0,0,0,0.6);
        }

        /* 🚀 BUTTON WITH ANIMATION */
        .submit-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .submit-btn:active { transform: scale(0.97); }
        .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; }
        
        .btn-student { background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%); color: #fff; }
        .btn-staff { background: linear-gradient(135deg, #d4af37 0%, #f5a623 100%); color: #000; }

        /* Spinner */
        .spinner {
            width: 18px; height: 18px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }
        .btn-staff .spinner { border-color: rgba(0,0,0,0.2); border-top-color: #000; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .submit-btn.loading .spinner { display: block; }
        .submit-btn.loading .btn-text { display: none; }
        .submit-btn.loading::after { content: 'Fetching...'; }

        /* Toast */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 99999; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 350px; pointer-events: none; }
        .toast { padding: 15px; border-radius: 12px; color: #fff; font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.8); font-size: 14px; animation: slideDownToast 0.4s ease forwards; text-align: center; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); }
        @keyframes slideDownToast { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOutToast { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-20px); } }

    </style>
</head>
<body>

    <div class="server-sync">
        <div class="sync-dot"></div> Live Server Synced
    </div>

    <video id="bg-video" autoplay loop muted playsinline>
        <source src="YouCut_20260623_145148990.mp4" type="video/mp4">
    </video>
    
    <div class="video-overlay"></div>
    <div id="toast-container"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="school-logo">MVM PUBLIC</div>
            <div class="school-sub">Central Portal</div>

            <div class="tab-container">
                <button class="tab-btn active" id="tab-student" onclick="switchPortal('student')">👨‍🎓 Student</button>
                <button class="tab-btn" id="tab-staff" onclick="switchPortal('staff')">🏛️ Staff / Admin</button>
            </div>

            <form id="student-form" class="login-form active" onsubmit="processLogin(event, 'student')">
                <div class="input-group">
                    <label>Student ID / Username</label>
                    <input type="text" id="student-id" placeholder="e.g. S-101 or adarsh" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="student-pass" placeholder="Enter password" required>
                </div>
                <button type="submit" class="submit-btn btn-student" id="btn-student">
                    <div class="spinner"></div><span class="btn-text">Secure Login</span>
                </button>
            </form>

            <form id="staff-form" class="login-form" onsubmit="processLogin(event, 'staff')">
                <div class="input-group">
                    <label>Staff ID / Official Email</label>
                    <input type="text" id="staff-id" placeholder="e.g. T-104 or principal" required>
                </div>
                <div class="input-group">
                    <label>Security Key</label>
                    <input type="password" id="staff-pass" placeholder="Enter password" required>
                </div>
                <button type="submit" class="submit-btn btn-staff" id="btn-staff">
                    <div class="spinner"></div><span class="btn-text">Authorize Access</span>
                </button>
            </form>
            
        </div>
    </div>

    <script>
        function showToast(title, message, color) {
            let container = document.getElementById("toast-container");
            let toast = document.createElement("div");
            toast.className = "toast"; 
            toast.style.background = color || "rgba(15, 23, 42, 0.9)";
            toast.innerHTML = `<div style="font-size:15px; margin-bottom:5px; text-transform:uppercase;">${title}</div><div style="font-size:13px; font-weight:normal; color:rgba(255,255,255,0.8);">${message}</div>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.animation = "fadeOutToast 0.4s ease forwards"; setTimeout(() => toast.remove(), 400); }, 3500);
        }

        function switchPortal(type) {
            document.getElementById('tab-student').classList.remove('active');
            document.getElementById('tab-staff').classList.remove('active');
            document.getElementById('tab-' + type).classList.add('active');

            document.getElementById('student-form').classList.remove('active');
            document.getElementById('staff-form').classList.remove('active');
            document.getElementById(type + '-form').classList.add('active');
            
            document.getElementById('student-id').value = ""; document.getElementById('student-pass').value = "";
            document.getElementById('staff-id').value = ""; document.getElementById('staff-pass').value = "";
        }

        async function processLogin(event, portalType) {
            event.preventDefault(); 

            // Yahan ID pass ho rahi hai, chahe email ho ya normal text
            const usernameOrEmail = document.getElementById(portalType + '-id').value.trim();
            const password = document.getElementById(portalType + '-pass').value;
            const btn = document.getElementById('btn-' + portalType);

            // Fetching animation start
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                // API Backend Hit (email key me text/username hi jayega backend handle kar lega)
                const response = await fetch("https://mvm-backend-file-1.onrender.com/login/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ "email": usernameOrEmail, "password": password })
                });

                const data = await response.json();

                if (response.ok) {
                    const role = data.role.toLowerCase();

                    // 🛑 STRICT ROLE CHECKING (Security Override) 🛑
                    
                    // Agar koi staff galti se Student portal se login kare
                    if (portalType === 'student' && role !== 'student') {
                        showToast("🛑 Access Denied", "Authorities & Staff cannot log in via the Student portal.", "#ef4444");
                        btn.classList.remove('loading'); btn.disabled = false;
                        return; 
                    }
                    
                    // Agar koi student galti se Staff portal se login kare
                    if (portalType === 'staff' && role === 'student') {
                        showToast("🛑 Access Denied", "Students are strictly prohibited from entering the Staff portal.", "#ef4444");
                        btn.classList.remove('loading'); btn.disabled = false;
                        return; 
                    }

                    // Login granted
                    localStorage.setItem("loggedInUser", data.user_name);
                    localStorage.setItem("userRole", role);

                    showToast("✅ Login Successful", "Loading your dashboard...", "#10b981");

                    // Role based Redirects
                    setTimeout(() => {
                        if (role === "student") window.location.href = "student_dashboard.html";
                        else if (role === "teacher") window.location.href = "teacher_dashboard.html";
                        else if (role === "vp") window.location.href = "vp_dashboard.html";
                        else if (role === "principal") window.location.href = "principal_dashboard.html";
                        else if (role === "hr") window.location.href = "hr_dashboard.html";
                        else if (role === "transport") window.location.href = "transport_dashboard.html";
                        else if (role === "admin") window.location.href = "admin_dashboard.html";
                        else if (role === "owner") window.location.href = "owner_dashboard.html";
                        else window.location.href = "index.html"; 
                    }, 1500);

                } else {
                    showToast("❌ Login Failed", data.detail || "Invalid credentials. Try again.", "#f59e0b");
                    btn.classList.remove('loading'); btn.disabled = false;
                }
            } catch (error) {
                console.error("Error:", error);
                showToast("⚠️ Server Offline", "Could not connect to the live server. Check your internet.", "#ef4444");
                btn.classList.remove('loading'); btn.disabled = false;
            }
        }
    </script>
</body>
</html>
