<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MVM Public School - Central ERP Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            background-color: #000; /* Pure black before video loads */
            color: #fff;
        }
        
        /* 🔱 MAHADEV VIDEO BACKGROUND (No Loop, Stops at Last Frame) */
        #bg-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -3;
            transform: translate(-50%, -50%);
            object-fit: cover;
            will-change: transform;
            transition: filter 1.5s ease;
        }
        
        /* 🎨 THEME BLENDING: Cosmic Tint Overlay (Initially Hidden) */
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Deep Space & Purple/Gold Cosmic Tint */
            background: linear-gradient(135deg, rgba(3, 7, 18, 0.4) 0%, rgba(45, 15, 75, 0.3) 50%, rgba(2, 6, 23, 0.7) 100%);
            z-index: -2;
            backdrop-filter: blur(0px);
            opacity: 0;
            transition: opacity 2s ease, backdrop-filter 2s ease;
        }

        /* Overlay activates when video ends */
        .video-overlay.active {
            opacity: 1;
            backdrop-filter: blur(4px); /* Halka blur to make login box pop */
        }

        /* 🟢 LIVE SYNC INDICATOR (Initially Hidden) */
        .server-sync {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-transform: uppercase;
            
            opacity: 0;
            transform: translateY(-20px);
            transition: all 1s ease 1s; /* Delayed entry */
        }
        .server-sync.active {
            opacity: 1;
            transform: translateY(0);
        }
        .sync-dot {
            width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; animation: blinkDot 1.5s infinite;
        }
        @keyframes blinkDot { 0% { opacity: 1; box-shadow: 0 0 10px #10b981; } 50% { opacity: 0.4; box-shadow: 0 0 2px #10b981; } 100% { opacity: 1; box-shadow: 0 0 10px #10b981; } }

        /* 📦 LOGIN CARD (Seamless Cosmic Glassmorphism) */
        .login-wrapper {
            position: relative;
            width: 90%;
            max-width: 400px;
            z-index: 10;
            
            /* 🎬 INITIAL STATE FOR CINEMATIC ANIMATION */
            opacity: 0;
            transform: scale(1.1) translateY(30px);
            filter: blur(15px);
            pointer-events: none;
            transition: opacity 1.5s cubic-bezier(0.165, 0.84, 0.44, 1), 
                        transform 1.5s cubic-bezier(0.165, 0.84, 0.44, 1), 
                        filter 1.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        /* 🎬 TRIGGERED STATE WHEN VIDEO ENDS */
        .login-wrapper.show-now {
            opacity: 1;
            transform: scale(1) translateY(0);
            filter: blur(0);
            pointer-events: auto;
        }

        .login-card {
            /* Ultra-sheer background so the cosmic video shines through */
            background: rgba(15, 10, 25, 0.35);
            /* Soft glowing border matching the Mahadev cosmic theme */
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-top: 1px solid rgba(212, 175, 55, 0.4); /* Faint gold top edge */
            border-radius: 24px;
            padding: 40px 30px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            /* Glowing purple and gold shadow to blend with the video */
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), 
                        0 0 40px rgba(139, 92, 246, 0.15), 
                        inset 0 0 20px rgba(255,255,255,0.02);
            text-align: center;
        }

        .school-logo {
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 5px;
            color: #fff;
            letter-spacing: 2px;
            text-shadow: 0 2px 15px rgba(255,255,255,0.4);
        }
        .school-sub {
            font-size: 12px;
            color: #d4af37; /* Bhasma Gold */
            margin-bottom: 30px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }

        /* 🎛️ TAB SWITCHER */
        .tab-container {
            display: flex;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 5px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #94a3b8;
            font-size: 13px;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .tab-btn.active {
            color: #fff;
            background: rgba(255,255,255,0.15);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-shadow: 0 0 8px rgba(255,255,255,0.5);
        }

        /* 📝 FORMS */
        .login-form { display: none; }
        .login-form.active { display: block; animation: fadeInForm 0.5s ease forwards; }
        @keyframes fadeInForm { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-group { margin-bottom: 20px; text-align: left; position: relative; }
        .input-group label {
            display: block; font-size: 11px; color: #cbd5e1; margin-bottom: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .input-group input {
            width: 100%;
            background: rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.1);
            border-bottom: 2px solid rgba(139, 92, 246, 0.4); /* Accent bottom line */
            padding: 15px;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.4s;
            font-weight: 600;
        }
        .input-group input:focus {
            border-color: rgba(212, 175, 55, 0.6); /* Gold focus */
            background: rgba(0,0,0,0.5);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .input-group input::placeholder { color: rgba(255,255,255,0.3); font-weight: normal; }

        /* 🚀 BUTTON WITH ANIMATION */
        .submit-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }
        .submit-btn:active { transform: scale(0.97); }
        .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; }
        
        .btn-student { background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%); color: #fff; box-shadow: 0 5px 20px rgba(99, 102, 241, 0.3); }
        .btn-staff { background: linear-gradient(135deg, #d4af37 0%, #f5a623 100%); color: #000; box-shadow: 0 5px 20px rgba(245, 166, 35, 0.3); }

        /* Hover light sweep effect */
        .submit-btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.5s;
        }
        .submit-btn:hover::before { left: 100%; }

        /* Spinner */
        .spinner {
            width: 18px; height: 18px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }
        .btn-staff .spinner { border-color: rgba(0,0,0,0.2); border-top-color: #000; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .submit-btn.loading .spinner { display: block; }
        .submit-btn.loading .btn-text { display: none; }
        .submit-btn.loading::after { content: 'Fetching...'; }

        /* Toast */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 100000; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 350px; pointer-events: none; }
        .toast { padding: 15px; border-radius: 12px; color: #fff; font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.8); font-size: 13px; text-transform: uppercase; animation: slideDownToast 0.4s ease forwards; text-align: center; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); letter-spacing: 0.5px;}
        @keyframes slideDownToast { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOutToast { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-20px); } }

    </style>
</head>
<body>

    <!-- 🟢 LIVE SYNC INDICATOR -->
    <div class="server-sync" id="sync-indicator">
        <div class="sync-dot"></div> Live Server Synced
    </div>

    <!-- 🔱 MAHADEV VIDEO BACKGROUND -->
    <!-- Muted & playsinline for mobile. Removed "loop" so it stops at the last frame -->
    <video id="bg-video" autoplay muted playsinline disablePictureInPicture preload="auto">
        <source src="YouCut_20260623_145148990.mp4" type="video/mp4">
    </video>
    
    <!-- Cosmic Fade Overlay -->
    <div class="video-overlay" id="video-overlay"></div>
    
    <div id="toast-container"></div>

    <div class="login-wrapper" id="login-wrapper">
        <div class="login-card">
            <div class="school-logo">MVM PUBLIC</div>
            <div class="school-sub">Central ERP Portal</div>

            <!-- TABS -->
            <div class="tab-container">
                <button class="tab-btn active" id="tab-student" onclick="switchPortal('student')">👨‍🎓 Student</button>
                <button class="tab-btn" id="tab-staff" onclick="switchPortal('staff')">🏛️ Staff / Admin</button>
            </div>

            <!-- 👨‍🎓 STUDENT LOGIN FORM -->
            <form id="student-form" class="login-form active" onsubmit="processLogin(event, 'student')">
                <div class="input-group">
                    <label>Student ID / Username</label>
                    <input type="text" id="student-id" placeholder="e.g. S-101 or adarsh" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="student-pass" placeholder="Enter password" required>
                </div>
                <button type="submit" class="submit-btn btn-student" id="btn-student">
                    <div class="spinner"></div><span class="btn-text">Secure Login</span>
                </button>
            </form>

            <!-- 🏛️ STAFF LOGIN FORM -->
            <form id="staff-form" class="login-form" onsubmit="processLogin(event, 'staff')">
                <div class="input-group">
                    <label>Staff ID / Official Email</label>
                    <input type="text" id="staff-id" placeholder="e.g. T-104 or principal" required>
                </div>
                <div class="input-group">
                    <label>Security Key</label>
                    <input type="password" id="staff-pass" placeholder="Enter password" required>
                </div>
                <button type="submit" class="submit-btn btn-staff" id="btn-staff">
                    <div class="spinner"></div><span class="btn-text">Authorize Access</span>
                </button>
            </form>
            
        </div>
    </div>

    <script>
        // 🛑 FIX: Login Page Specific Interlock (No Infinite Loop)
        (function globalSecurityInterlocks() {
            let token = localStorage.getItem('erp_jwt_token');
            
            // AUTO-LOGIN: Agar pehle se login hai, toh wapas usi dashboard par bhej do
            if(token) {
                try {
                    let role = atob(token).split('-')[0].toLowerCase();
                    window.location.href = role + "_dashboard.html";
                    return; 
                } catch(e) {
                    localStorage.removeItem('erp_jwt_token'); 
                }
            }
            // Agar token nahi hai, toh rukne do. Redirect MAT karo.

            setInterval(() => {
                let lockdown = localStorage.getItem('school_status');
                if(lockdown === 'lockdown' && !window.location.href.includes('principal_dashboard')) {
                    document.body.innerHTML = `<div style='height:100vh; width:100vw; background:#000; color:#ef4444; display:flex; justify-content:center; align-items:center; font-size:24px; font-weight:900; text-align:center; z-index:999999; position:fixed; top:0; left:0;'>🚨 SCHOOL IN EMERGENCY LOCKDOWN.<br>STAY IN YOUR CLASSES. 🚨</div>`;
                }
                let sos = JSON.parse(localStorage.getItem('global_sos_alert'));
                if(sos && sos.active && (window.location.href.includes('vp_dashboard') || window.location.href.includes('principal_dashboard'))) {
                    if(!document.getElementById('sos-overlay')) {
                        let audio = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3'); 
                        audio.id = 'bhasma-alarm'; audio.loop = true; audio.play().catch(e=>console.log("Audio locked"));
                        document.body.innerHTML += `<div id='sos-overlay' style='height:100vh; width:100vw; background:#ef4444; color:#fff; display:flex; flex-direction:column; justify-content:center; align-items:center; font-size:30px; font-weight:900; text-align:center; position:fixed; top:0; left:0; z-index:999999;'>🚨 TRANSPORT SOS ACTIVE: ${sos.bus} 🚨<br><button onclick='acknowledgeSOS()' style='margin-top:30px; padding:15px 30px; border-radius:12px; font-size:20px; color:#000; cursor:pointer;'>Acknowledge & Stop</button></div>`;
                    }
                }
            }, 2500);
        })();
        window.acknowledgeSOS = function() { localStorage.removeItem('global_sos_alert'); location.reload(); };
        // --- 🎬 CINEMATIC VIDEO & ANIMATION LOGIC ---
        document.addEventListener("DOMContentLoaded", function() {
            const video = document.getElementById("bg-video");
            const overlay = document.getElementById("video-overlay");
            const loginWrapper = document.getElementById("login-wrapper");
            const syncIndicator = document.getElementById("sync-indicator");
            let hasTriggered = false;

            // Function to trigger the magic
            function revealLoginUI() {
                if(hasTriggered) return;
                hasTriggered = true;
                
                // Dim the video slightly and add cosmic blur
                overlay.classList.add("active");
                video.style.filter = "brightness(0.8)";
                
                // Bring in the Login Box and Sync Indicator smoothly
                loginWrapper.classList.add("show-now");
                syncIndicator.classList.add("active");
            }

            // 1. Wait for video to naturally end (Last Frame Freeze)
            video.addEventListener('ended', revealLoginUI);

            // 2. Play promise handling (Browsers blocking autoplay)
            let playPromise = video.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    // Agar browser auto-play roke (battery saver wagera me), toh direct UI khol do
                    console.log("Autoplay blocked, showing UI immediately.");
                    revealLoginUI();
                });
            }

            // 3. Fallback Safety Timer
            // Agar video bohot lamba hai ya atak gaya, to 8 seconds baad forcibly UI aa jayega.
            // Tumhe lagta hai video 8 seconds se lamba hai toh isko badha lena (e.g., 12000)
            setTimeout(revealLoginUI, 8000); 
        });

        // --- TOAST NOTIFICATION SYSTEM ---
        function showToast(title, message, color) {
            let container = document.getElementById("toast-container");
            let toast = document.createElement("div");
            toast.className = "toast"; 
            toast.style.background = color || "rgba(15, 23, 42, 0.9)";
            toast.innerHTML = `<div style="font-size:14px; margin-bottom:4px;">${title}</div><div style="font-size:12px; font-weight:normal; color:rgba(255,255,255,0.8); text-transform:none;">${message}</div>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.animation = "fadeOutToast 0.4s ease forwards"; setTimeout(() => toast.remove(), 400); }, 3500);
        }

        // --- TAB SWITCHER LOGIC ---
        function switchPortal(type) {
            document.getElementById('tab-student').classList.remove('active');
            document.getElementById('tab-staff').classList.remove('active');
            document.getElementById('tab-' + type).classList.add('active');

            document.getElementById('student-form').classList.remove('active');
            document.getElementById('staff-form').classList.remove('active');
            document.getElementById(type + '-form').classList.add('active');
            
            document.getElementById('student-id').value = ""; document.getElementById('student-pass').value = "";
            document.getElementById('staff-id').value = ""; document.getElementById('staff-pass').value = "";
        }

        // --- FETCH & SMART LOGIN LOGIC ---
        async function processLogin(event, portalType) {
            event.preventDefault(); 

            const usernameOrEmail = document.getElementById(portalType + '-id').value.trim();
            const password = document.getElementById(portalType + '-pass').value;
            const btn = document.getElementById('btn-' + portalType);

            btn.classList.add('loading');
            btn.disabled = true;

            try {
                const response = await fetch("https://mvm-backend-file-1.onrender.com/login/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ "email": usernameOrEmail, "password": password })
                });

                const data = await response.json();

                if (response.ok) {
                    const role = data.role.toLowerCase();

                    // 🛑 STRICT ROLE CHECKING (Security Override)
                    if (portalType === 'student' && role !== 'student') {
                        showToast("🛑 Access Denied", "Authorities cannot log in via the Student portal.", "#ef4444");
                        btn.classList.remove('loading'); btn.disabled = false;
                        return; 
                    }
                    if (portalType === 'staff' && role === 'student') {
                        showToast("🛑 Access Denied", "Students are prohibited from entering the Staff portal.", "#ef4444");
                        btn.classList.remove('loading'); btn.disabled = false;
                        return; 
                    }

                    localStorage.setItem("loggedInUser", data.user_name);
                    localStorage.setItem("userRole", role);
                    // 🛑 LEVEL 1 FIX: Setting Unique ID (Backend Fallback to Local Mock)
                    localStorage.setItem("loggedInUserId", data.user_id || ("STU-" + Math.floor(1000 + Math.random() * 9000)));

                    showToast("✅ Identity Verified", "Entering portal...", "#10b981");

                    // Hide UI and redirect
                    document.getElementById("login-wrapper").style.opacity = "0";

                    setTimeout(() => {
                        let token = btoa(role + "-" + new Date().getTime() + "-MVM-SECURE");
                        localStorage.setItem('erp_jwt_token', token);
                        localStorage.setItem('userRole', role);
                        if (role === "student") window.location.href = "student_dashboard.html";
                        else if (role === "teacher") window.location.href = "teacher_dashboard.html";
                        else if (role === "vp") window.location.href = "vp_dashboard.html";
                        else if (role === "principal") window.location.href = "principal_dashboard.html";
                        else if (role === "hr") window.location.href = "hr_dashboard.html";
                        else if (role === "transport") window.location.href = "transport_dashboard.html";
                        else if (role === "admin") window.location.href = "admin_dashboard.html";
                        else if (role === "owner") window.location.href = "owner_dashboard.html";
                        else window.location.href = "index.html"; 
                    }, 1200);

                } else {
                    showToast("❌ Authorization Failed", data.detail || "Invalid credentials.", "#f59e0b");
                    btn.classList.remove('loading'); btn.disabled = false;
                }
            } catch (error) {
                console.error("Error:", error);
                showToast("⚠️ Server Offline", "Could not connect to the live database.", "#ef4444");
                btn.classList.remove('loading'); btn.disabled = false;
            }
        }
    </script>
</body>
</html>
